<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Basic CSS for styling is included from style.css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card-container fade-in">
        <div class="card-header">
            <h2>Student Enrollment</h2>
            <p class="subtitle">Enter student details below to securely register or update.</p>
        </div>

        <form id="enrollmentForm" class="form-body">
            <!-- Form Fields -->
            <div class="form-group">
                <label for="rollNo">Roll No</label>
                <!-- onchange triggers when value changes and field loses focus -->
                <input type="number" id="rollNo" name="rollNo" onchange="checkRollNo()"
                    placeholder="Enter Roll Number to begin" required>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter Full Name" disabled required>
                </div>

                <div class="form-group half-width">
                    <label for="stuClass">Class</label>
                    <input type="text" id="stuClass" name="stuClass" placeholder="Enter Class" disabled required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label for="birthDate">Birth Date</label>
                    <input type="date" id="birthDate" name="birthDate" disabled required>
                </div>

                <div class="form-group half-width">
                    <label for="enrollmentDate">Enrollment Date</label>
                    <input type="date" id="enrollmentDate" name="enrollmentDate" disabled required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter Full Address" disabled required>
            </div>

            <!-- Action buttons -->
            <div class="button-group">
                <button type="button" id="saveBtn" class="btn-save" onclick="saveData()" disabled>Save</button>
                <button type="button" id="updateBtn" class="btn-update" onclick="updateData()" disabled>Update</button>
                <button type="button" id="resetBtn" class="btn-reset" onclick="resetForm()" disabled>Reset</button>
            </div>
        </form>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Script separated for clean logic -->
    <script src="script.js"></script>
</body>

</html>
